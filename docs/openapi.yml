openapi: 3.0.3

info:
  title: SkinMate API
  version: 0.3.0
  description: |
    SkinMate MVP版 API設計書。
    更新日：2026/06/20（バックエンド実装に同期）

    ## 認証
    Firebase Authentication を利用する。
    フロントエンドで Firebase Auth SDK によりログイン・新規登録を行い、
    バックエンドAPIでは Authorization ヘッダーで受け取った Firebase ID Token を検証する。
    全エンドポイントが `Authorization: Bearer <Firebase ID Token>` を必須とする。

    ## エラー形式
    - ハンドリング済みエラー（400/401/404/409 と各ルートの内部500）は
      `errors.ts` 経由で **{ error, message }** 形で返す。
      error コード例: UNAUTHORIZED / BAD_REQUEST / NOT_FOUND / ALREADY_EXISTS /
      ITEM_LIMIT_EXCEEDED / INTERNAL_SERVER_ERROR。
    - 未捕捉の例外（グローバル onError）と存在しないURL（notFound）は、
      別形の **{ status, message }** を返す（AI生成失敗など一部の500がこれに該当）。

    ## MVPスコープ外
      - 独自ログイン/サインアップAPI（Firebase側で実施）
      - 生理周期API（daily_logs.isMenstruation に統合）
      - 日々の肌記録の削除API
      - ユーザー向け成分検索API / カテゴリ一覧取得API
      - AI提案 最新取得専用API
      - いつものセット機能 / 有料プラン機能

servers:
  - url: http://localhost:8000
    description: ローカル開発環境（バックエンド。Swagger UI は /docs）

tags:
  - name: Users
    description: Firebase認証済みユーザーのプロフィール取得・編集
  - name: DailyLogs
    description: 日々の肌記録
  - name: Items
    description: 化粧品マスタ
  - name: UserItems
    description: ユーザー所有アイテム
  - name: AISuggestions
    description: AI提案履歴・AI提案生成

paths:
  /api/users/me:
    get:
      tags: [Users]
      summary: 自分のプロフィール取得（未登録時は初期作成）
      description: |
        AuthorizationヘッダーのIDトークンからFirebase UIDを特定し、
        profiles に該当UIDがいればその情報を返す。いなければ Firebase の情報を元に
        新規レコードを作成して返す。
      security:
        - firebaseAuth: []
      responses:
        "200":
          description: 取得または新規作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      tags: [Users]
      summary: プロフィール編集（肌タイプ登録含む・S3-10）
      description: |
        自分のプロフィール情報を部分更新する。送られてきた項目だけ更新する。
        メールアドレス・パスワードは Firebase Authentication 側で管理するため扱わない。
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateInput"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/daily_logs:
    get:
      tags: [DailyLogs]
      summary: 日々の肌記録一覧取得（カレンダー表示用）
      description: |
        指定期間の肌記録を取得する。一覧表示に必要な id・log_date・skin_condition のみ返す。
        start_date と end_date は必須。
      security:
        - firebaseAuth: []
      parameters:
        - name: start_date
          in: query
          required: true
          description: 取得開始日
          schema: { type: string, format: date, example: "2026-05-01" }
        - name: end_date
          in: query
          required: true
          description: 取得終了日
          schema: { type: string, format: date, example: "2026-05-31" }
      responses:
        "200":
          description: 一覧取得成功
          content:
            application/json:
              schema:
                type: object
                required: [logs]
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/DailyLogSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [DailyLogs]
      summary: 日々の肌記録 作成・更新（upsert）
      description: |
        1日分の肌記録を作成、または同じ「ユーザー × 日付」が存在すれば更新する。
        朝/夜の使用アイテムは used_items に指定があった分だけ保存する。
        成功時のステータスは **200**（201ではない）。
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyLogUpsertInput"
      responses:
        "200":
          description: 作成または更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLogDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/daily_logs/{log_date}:
    get:
      tags: [DailyLogs]
      summary: 指定日の肌記録取得
      description: |
        指定日の肌記録を1件取得する。使用アイテム履歴は朝/夜を1件ずつ含めて返す。
        記録が存在しない場合も 200 で `{ "log": null }` を返す（404にはならない）。
      security:
        - firebaseAuth: []
      parameters:
        - name: log_date
          in: path
          required: true
          description: 取得対象日（YYYY-MM-DD）
          schema: { type: string, format: date, example: "2026-05-17" }
      responses:
        "200":
          description: 取得成功（記録なしの場合 log は null）
          content:
            application/json:
              schema:
                type: object
                required: [log]
                properties:
                  log:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/DailyLogDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/daily_logs/{id}:
    patch:
      tags: [DailyLogs]
      summary: 既存の肌記録を編集（S3-26）
      description: |
        既存の肌記録を **記録ID（daily_logs.id）** で部分更新する。
        ※取得系（GET /api/daily_logs/{log_date}）が「日付」をキーにするのに対し、
        この編集は「記録ID」をキーにする点に注意（実装に準拠）。
        基本項目・使用アイテムのいずれも指定が無い場合は 400。
        本人の記録でない/存在しない場合は 404。
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 更新対象の記録ID（daily_logs.id）
          schema: { type: string, example: "7f1a30f0-0e1f-4f4b-9c8d-8f1f5b7c1234" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyLogUpdateInput"
      responses:
        "200":
          description: 更新成功（更新後の詳細を返す）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLogDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/items:
    get:
      tags: [Items]
      summary: 化粧品マスタ検索
      description: |
        化粧品マスタを商品名・ブランド名で部分一致（大文字小文字無視）検索する。
        q が無ければ全件対象。カテゴリは入れ子オブジェクト `{ id, name }` で返す。
        成分検索・カテゴリ検索はMVP対象外（成分はAI提案生成時にバックエンド内部で参照）。
      security:
        - firebaseAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: 商品名またはブランド名の検索キーワード
          schema: { type: string, example: "ジェニフィック" }
        - name: limit
          in: query
          required: false
          description: 取得件数（1〜100、範囲外は丸め）
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          required: false
          description: 取得開始位置
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: 検索成功
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ItemSearchResult"
                  total:
                    type: integer
                    example: 120
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/user_items:
    get:
      tags: [UserItems]
      summary: 自分の手持ちアイテム一覧
      description: |
        ログインユーザーが登録している手持ちアイテム一覧を取得する。
        各要素は user_items.id と、紐づくアイテム情報（カテゴリはフラットな
        category_id / category_name 形）を含む。
      security:
        - firebaseAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required: [user_items]
                properties:
                  user_items:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserItemEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [UserItems]
      summary: 手持ちアイテムに追加（MVP上限10件・S3-12）
      description: |
        化粧品マスタから選択したアイテムを手持ちに追加する。
        登録上限は10件。成功時のステータスは **201**。
        400 の error コードは BAD_REQUEST（リクエスト不正）または
        ITEM_LIMIT_EXCEEDED（上限超過）。
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserItemCreateInput"
      responses:
        "201":
          description: 追加成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserItemCreated"
        "400":
          description: リクエスト不正（BAD_REQUEST）または上限超過（ITEM_LIMIT_EXCEEDED）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 指定されたアイテムが存在しない（NOT_FOUND）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: すでに手持ちアイテムとして登録済み（ALREADY_EXISTS）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/user_items/{id}:
    delete:
      tags: [UserItems]
      summary: 手持ちアイテムを削除
      description: |
        自分の手持ちアイテムから指定アイテムを削除する。成功時は **204**（ボディなし）。
        過去の肌記録（log_used_items）は items 側に紐づくため、削除後も履歴は保持される。
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: user_items.id
          schema: { type: string, example: "user_item_001" }
      responses:
        "204":
          description: 削除成功（レスポンスボディなし）
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 指定された手持ちアイテムが存在しない（NOT_FOUND）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/ai_suggestions:
    get:
      tags: [AISuggestions]
      summary: AI提案履歴取得
      description: |
        ログインユーザーのAI提案履歴を取得する。
        最新1件だけ欲しい場合は sort=desc&limit=1 を指定する。
      security:
        - firebaseAuth: []
      parameters:
        - name: suggestion_type
          in: query
          required: false
          description: 提案種別で絞り込み
          schema:
            type: string
            enum: [home_summary, daily_comment]
            example: home_summary
        - name: sort
          in: query
          required: false
          description: suggested_at の並び順（asc 以外は desc 扱い）
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: limit
          in: query
          required: false
          description: 取得件数
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          required: false
          description: 取得開始位置
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: 履歴取得成功
          content:
            application/json:
              schema:
                type: object
                required: [suggestions, total]
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: "#/components/schemas/AISuggestion"
                  total:
                    type: integer
                    example: 12
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [AISuggestions]
      summary: AI提案生成
      description: |
        記録・所有アイテム・成分情報をもとにAI提案を生成し、ai_suggestions に保存する。
        suggestion_type で用途を分ける（home_summary=直近傾向の要約 /
        daily_comment=記録保存後の短文コメント）。
        分析期間はバックエンド側で算出する（home_summary は直近7日、
        daily_comment は target_date または当日）。成功時のステータスは **201**。

        ※500（AI生成失敗など未捕捉例外）はグローバルハンドラ経由で
        `{ status, message }` 形になる点に注意。
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AISuggestionCreateInput"
      responses:
        "201":
          description: 生成・保存成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISuggestion"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: AI提案生成失敗など（グローバルハンドラ。形は { status, message }）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerException"

components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: |
        Firebase Authentication で取得した ID Token を Authorization ヘッダーに指定する。
        例: `Authorization: Bearer <Firebase ID Token>`

  responses:
    BadRequest:
      description: リクエスト内容が不正（BAD_REQUEST）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Firebase ID Token が未指定・無効・期限切れ（UNAUTHORIZED）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 対象リソースが存在しない（NOT_FOUND）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalServerError:
      description: サーバー内部エラー（INTERNAL_SERVER_ERROR）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    User:
      type: object
      required: [id, created_at, updated_at]
      properties:
        id:
          type: string
          description: Firebase Authentication の UID
          example: firebase_uid_xxxxx
        name:
          type: string
          nullable: true
          example: 加藤 美咲
        birth_day:
          type: string
          format: date
          nullable: true
          example: "1998-10-31"
        skin_type:
          type: string
          nullable: true
          description: 肌タイプ（サーバー側でenum強制はしないが、想定値は下記）
          enum: [normal, dry, oily, combination, sensitive]
          example: combination
        created_at:
          type: string
          format: date-time
          example: "2026-05-17T10:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-17T10:00:00.000Z"

    UserUpdateInput:
      type: object
      description: 送られた項目だけ部分更新する。
      properties:
        name:
          type: string
          nullable: true
          example: 加藤 美咲
        birth_day:
          type: string
          format: date
          nullable: true
          description: YYYY-MM-DD 形式。不正な日付は400。
          example: "1998-10-31"
        skin_type:
          type: string
          nullable: true
          enum: [normal, dry, oily, combination, sensitive]
          example: combination

    DailyLogSummary:
      type: object
      required: [id, log_date, skin_condition]
      properties:
        id:
          type: string
          example: 7f1a30f0-0e1f-4f4b-9c8d-8f1f5b7c1234
        log_date:
          type: string
          format: date
          example: "2026-05-17"
        skin_condition:
          type: integer
          description: 1=悪い, 2=普通, 3=良い
          enum: [1, 2, 3]
          example: 2

    DailyLogDetail:
      type: object
      required:
        - id
        - user_id
        - log_date
        - skin_condition
        - isMenstruation
        - used_items
        - created_at
        - updated_at
      properties:
        id:
          type: string
          example: 7f1a30f0-0e1f-4f4b-9c8d-8f1f5b7c1234
        user_id:
          type: string
          description: Firebase Authentication の UID
          example: firebase_uid_xxxxx
        log_date:
          type: string
          format: date
          example: "2026-05-17"
        skin_condition:
          type: integer
          enum: [1, 2, 3]
          example: 2
        weather:
          type: string
          nullable: true
          example: cloudy
        sleep_level:
          type: string
          nullable: true
          example: normal
        meal_balance:
          type: string
          nullable: true
          example: normal
        free_note:
          type: string
          nullable: true
          example: 少し乾燥ぎみだった
        isMenstruation:
          type: boolean
          example: false
        used_items:
          $ref: "#/components/schemas/UsedItems"
        created_at:
          type: string
          format: date-time
          example: "2026-05-17T10:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-17T10:00:00.000Z"

    DailyLogUpsertInput:
      type: object
      required: [log_date, skin_condition, isMenstruation]
      properties:
        log_date:
          type: string
          format: date
          example: "2026-05-17"
        skin_condition:
          type: integer
          enum: [1, 2, 3]
          example: 2
        weather:
          type: string
          nullable: true
          example: cloudy
        sleep_level:
          type: string
          nullable: true
          example: normal
        meal_balance:
          type: string
          nullable: true
          example: normal
        free_note:
          type: string
          nullable: true
          example: 少し乾燥ぎみだった
        isMenstruation:
          type: boolean
          example: false
        used_items:
          $ref: "#/components/schemas/UsedItemsInput"

    DailyLogUpdateInput:
      type: object
      description: |
        部分更新。基本項目・used_items のいずれも無い場合は400。
        日付はパス（{id}）ではなく記録IDで対象を特定する。
      properties:
        skin_condition:
          type: integer
          enum: [1, 2, 3]
          example: 3
        weather:
          type: string
          nullable: true
          example: sunny
        sleep_level:
          type: string
          nullable: true
          example: normal
        meal_balance:
          type: string
          nullable: true
          example: good
        free_note:
          type: string
          nullable: true
          example: 保湿したら良くなった
        isMenstruation:
          type: boolean
          example: false
        used_items:
          $ref: "#/components/schemas/UsedItemsInput"

    UsedItemsInput:
      type: object
      description: 1日分の使用アイテム入力。朝/夜をそれぞれ1件ずつ扱う。
      properties:
        morning:
          $ref: "#/components/schemas/UsedItemGroupInput"
        night:
          $ref: "#/components/schemas/UsedItemGroupInput"

    UsedItemGroupInput:
      type: object
      required: [item_ids]
      properties:
        item_ids:
          type: array
          description: 使用した items.id の配列（順序＝使用順）。
          items: { type: string }
          example:
            - 4d3e1e8a-0f4d-4e75-bd12-1b76d7991234
            - 9b8e1a6c-1d9f-432a-bf37-35bfeaf91234

    UsedItems:
      type: object
      description: 1日分の使用アイテム履歴。朝/夜をそれぞれ1件ずつ返す（無ければ null）。
      required: [morning, night]
      properties:
        morning:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/UsedItemGroup"
        night:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/UsedItemGroup"

    UsedItemGroup:
      type: object
      required: [id, time_of_day, item_ids, items]
      properties:
        id:
          type: string
          description: log_used_items.id
          example: 64a7736a-857d-4fc0-b496-8b3c26e91234
        time_of_day:
          type: string
          enum: [morning, night]
          example: morning
        item_ids:
          type: array
          description: 使用した items.id の配列（順序＝使用順）。
          items: { type: string }
        items:
          type: array
          description: 表示用アイテム情報（item_ids の順）。id・brand・name のみ。
          items:
            $ref: "#/components/schemas/ItemRef"

    ItemRef:
      type: object
      description: 使用アイテム表示用の最小情報。
      required: [id, brand, name]
      properties:
        id: { type: string, example: 4d3e1e8a-0f4d-4e75-bd12-1b76d7991234 }
        brand: { type: string, example: ランコム }
        name: { type: string, example: ジェニフィック アドバンスト N }

    ItemSearchResult:
      type: object
      description: 化粧品マスタ検索の返却形。カテゴリは入れ子オブジェクト。
      required: [id, brand, name, category]
      properties:
        id: { type: string, example: 4d3e1e8a-0f4d-4e75-bd12-1b76d7991234 }
        brand: { type: string, example: ランコム }
        name: { type: string, example: ジェニフィック アドバンスト N }
        category:
          $ref: "#/components/schemas/CategoryRef"

    CategoryRef:
      type: object
      required: [id, name]
      properties:
        id: { type: string, example: b0d1c4de-6c61-4c4a-9b10-3a19fda11234 }
        name: { type: string, example: 美容液 }

    UserItemEntry:
      type: object
      description: 手持ちアイテム一覧の1要素。
      required: [id, item]
      properties:
        id:
          type: string
          description: user_items.id
          example: user_item_001
        item:
          $ref: "#/components/schemas/UserItemProduct"

    UserItemProduct:
      type: object
      description: 手持ちアイテムに紐づく製品情報（カテゴリはフラット形）。
      required: [id, brand, name, category_id, category_name, created_at, updated_at]
      properties:
        id: { type: string, example: 4d3e1e8a-0f4d-4e75-bd12-1b76d7991234 }
        brand: { type: string, example: ランコム }
        name: { type: string, example: ジェニフィック アドバンスト N }
        category_id:
          type: string
          example: b0d1c4de-6c61-4c4a-9b10-3a19fda11234
        category_name:
          type: string
          example: 美容液
        created_at:
          type: string
          format: date-time
          example: "2026-05-17T10:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-17T10:00:00.000Z"

    UserItemCreateInput:
      type: object
      required: [item_id]
      properties:
        item_id:
          type: string
          description: 追加する items.id
          example: item-001

    UserItemCreated:
      type: object
      required: [id, item_id]
      properties:
        id:
          type: string
          description: user_items.id
          example: user_item_001
        item_id:
          type: string
          description: items.id
          example: item-001

    AISuggestionCreateInput:
      type: object
      required: [suggestion_type]
      properties:
        suggestion_type:
          type: string
          enum: [home_summary, daily_comment]
          example: home_summary
        target_date:
          type: string
          format: date
          nullable: true
          description: |
            daily_comment の場合の対象日。省略時は当日。
            home_summary では未使用（分析期間はバックエンドが直近7日で算出）。
          example: "2026-05-17"

    AISuggestion:
      type: object
      required: [id, user_id, suggested_at, suggestion_type, title, created_at]
      properties:
        id:
          type: string
          example: 91d5c671-6f3d-48f2-b1e5-8acdbd9a1234
        user_id:
          type: string
          description: Firebase Authentication の UID
          example: firebase_uid_xxxxx
        suggested_at:
          type: string
          format: date-time
          example: "2026-05-17T10:00:00.000Z"
        suggestion_type:
          type: string
          enum: [home_summary, daily_comment]
          example: home_summary
        title:
          type: string
          example: 今日は引き算推奨日です
        body:
          type: string
          nullable: true
          example: 直近1週間は肌状態が安定しています。今日はシンプルなケアがおすすめです。
        basis:
          type: string
          nullable: true
          description: home_summary のときに「商品名A × 商品名B」形で根拠を返す。daily_comment は null。
          example: 化粧水A × 乳液B
        created_at:
          type: string
          format: date-time
          example: "2026-05-17T10:00:00.000Z"

    ErrorResponse:
      type: object
      description: ハンドリング済みエラーの統一形（errors.ts）。
      required: [error, message]
      properties:
        error:
          type: string
          description: エラーコード（大文字）
          example: UNAUTHORIZED
        message:
          type: string
          example: トークンが無効です

    ServerException:
      type: object
      description: 未捕捉例外のグローバルハンドラ（onError）が返す形。
      required: [status, message]
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: 予期せぬエラーが発生しました
        stack:
          type: string
          nullable: true
          description: NODE_ENV=development のときのみ含まれる。
