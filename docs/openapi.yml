openapi: 3.0.3

info:
  title: SkinMate API
  version: 0.2.0
  description: |
    SkinMate MVP版 API設計書。
    更新日：2026/06/02

    認証は Firebase Authentication を利用する。
    フロントエンドで Firebase Auth SDK によりログイン・新規登録を行い、
    バックエンドAPIでは Authorization ヘッダーで受け取った Firebase ID Token を検証する。

    MVPスコープ外:
      - 独自ログインAPI
      - 独自サインアップAPI
      - 生理周期API
      - 日々の肌記録削除API
      - 成分検索API
      - カテゴリ一覧取得API
      - AI提案最新取得専用API
      - いつものセット機能
      - 有料プラン機能

servers:
  - url: http://localhost:3000
    description: ローカル開発環境

tags:
  - name: Users
    description: Firebase認証済みユーザーのプロフィール取得・編集
  - name: DailyLogs
    description: 日々の肌記録
  - name: Items
    description: 化粧品マスタ
  - name: UserItems
    description: ユーザー所有アイテム
  - name: AISuggestions
    description: AI提案履歴・AI提案生成

paths:
  /api/users/me:
    get:
      tags:
        - Users
      summary: 自分のプロフィール取得（未登録時は初期作成）
      description: |
        【Firebase Auth連携】
        1. AuthorizationヘッダーのIDトークンからFirebase UIDを特定。
        2. DB（profiles）に該当UIDがいれば、その情報を返す。
        3. DBにいなければ、Firebaseの情報を元に新規レコードを作成して返す。
      security:
        - firebaseAuth: []
      responses:
        "200":
          description: 取得または新規作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      tags:
        - Users
      summary: プロフィール編集（肌タイプ登録含む）
      description: |
        対応FR - FR-004

        自分のプロフィール情報を更新する。
        メールアドレス・パスワードは Firebase Authentication 側で管理するため、このAPIでは扱わない。
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: 加藤 美咲
                birth_day:
                  type: string
                  format: date
                  example: "1998-10-31"
                skin_type:
                  type: string
                  enum:
                    - normal
                    - dry
                    - oily
                    - combination
                    - sensitive
                  example: combination
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/daily_logs:
    get:
      tags:
        - DailyLogs
      summary: 日々の肌記録一覧取得
      description: |
        カレンダー表示用に、指定期間の肌記録を取得する。
        MVPでは一覧表示に必要なスキンコンディションのみ返す。
      security:
        - firebaseAuth: []
      parameters:
        - name: start_date
          in: query
          required: true
          description: 取得開始日
          schema:
            type: string
            format: date
            example: 2026-05-01
        - name: end_date
          in: query
          required: true
          description: 取得終了日
          schema:
            type: string
            format: date
            example: 2026-05-31
      responses:
        "200":
          description: 日々の肌記録一覧取得成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - logs
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/DailyLogSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - DailyLogs
      summary: 日々の肌記録作成
      description: |
        1日分の肌記録を作成する。

        daily_logs は「ユーザー × 日付」で1件のみ作成される。
        指定日の記録が存在しない場合は新規作成する。

        使用アイテム履歴は、1日あたり朝と夜を1件ずつ扱う。
        morning が指定された場合は朝の使用アイテム履歴を作成する。
        night が指定された場合は夜の使用アイテム履歴を作成する。

        使用アイテムは items.id を指定する。
        フロントエンドではユーザー所有アイテムからのみ選択させる。
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyLogUpsertInput"
      responses:
        "200":
          description: 日々の肌記録作成または更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyLogDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/daily_logs/{log_date}:
    get:
      tags:
        - DailyLogs
      summary: 指定日の肌記録取得
      description: |
        指定日の肌記録を取得する。

        1日あたり daily_logs から肌記録を1件取得する。
        使用アイテム履歴は、log_used_items から朝と夜を1件ずつ取得する。
        記録が存在しない場合は log: null を返す。
      security:
        - firebaseAuth: []
      parameters:
        - name: log_date
          in: path
          required: true
          description: 取得対象日
          schema:
            type: string
            format: date
            example: 2026-05-17
      responses:
        "200":
          description: 指定日の肌記録取得成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - log
                properties:
                  log:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/DailyLogDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      tags:
        - DailyLogs
      summary: 指定日の肌記録更新
      description: |
        指定した日付の記録を部分更新する。
        朝のデータだけ、あるいは夜のデータだけを更新する場合に適している。
      parameters:
        - name: log_date
          in: path
          required: true
          schema:
            type: string
            format: date
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyLogUpdateInput" # 更新用のスキーマ
      responses:
        "200":
          description: 更新成功

  /api/items:
    get:
      tags:
        - Items
      summary: 化粧品マスタ検索
      description: |
        化粧品マスタを商品名・ブランド名で検索する。
        ユーザーが検索するのは製品情報のみとし、成分検索・カテゴリ検索はMVP対象外とする。
        成分情報はAI提案生成時にバックエンド内部で参照する。
      security:
        - firebaseAuth: []
      parameters:
        - name: q
          in: query
          required: false
          description: 商品名またはブランド名の検索キーワード
          schema:
            type: string
            example: ジェニフィック
        - name: limit
          in: query
          required: false
          description: 取得件数
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          description: 取得開始位置
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: 化粧品マスタ検索成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - total
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Item"
                  total:
                    type: integer
                    example: 120
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/user_items:
    get:
      tags:
        - UserItems
      summary: 自分の手持ちアイテム一覧
      description: |
        ログインユーザーが登録している手持ちアイテム一覧を取得する。
        記録画面の朝・夜ケア選択肢にも使用する。
      security:
        - firebaseAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - user_items
                properties:
                  user_items:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - item
                      properties:
                        id:
                          type: string
                          description: user_items.id
                          example: user_item_001
                        item:
                          $ref: "#/components/schemas/Item"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - UserItems
      summary: 手持ちアイテムに追加（MVP上限10件）
      description: |
        対応FR - FR-018

        化粧品マスタから選択したアイテムを、ログインユーザーの手持ちアイテムとして追加する。
        MVPでは手持ちアイテムの登録上限を10件とする。
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - item_id
              properties:
                item_id:
                  type: string
                  example: item-001
      responses:
        "201":
          description: 追加成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - item_id
                properties:
                  id:
                    type: string
                    description: user_items.id
                    example: user_item_001
                  item_id:
                    type: string
                    description: items.id
                    example: item-001
        "400":
          description: 上限超過またはリクエスト不正
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                  - message
                properties:
                  error:
                    type: string
                    example: ITEM_LIMIT_EXCEEDED
                  message:
                    type: string
                    example: 手持ちアイテムは10件までです
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 指定されたアイテムが存在しない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: すでに手持ちアイテムとして登録済み
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/user_items/{id}:
    delete:
      tags:
        - UserItems
      summary: 手持ちアイテムを削除
      description: |
        ログインユーザーの手持ちアイテムから指定アイテムを削除する。
        過去の肌記録は log_used_items.item_id で items に紐づくため、手持ちアイテム削除後も履歴は保持される。
      security:
        - firebaseAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: user_items.id
          schema:
            type: string
            example: user_item_001
      responses:
        "204":
          description: 削除成功（レスポンスボディなし）
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 指定された手持ちアイテムが存在しない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/ai_suggestions:
    get:
      tags:
        - AISuggestions
      summary: AI提案履歴取得
      description: |
        ログインユーザーのAI提案履歴を取得する。
        最新の提案のみ取得したい場合は sort=desc&limit=1 を指定する。
        AI提案最新取得専用APIは作成しない。
      security:
        - firebaseAuth: []
      parameters:
        - name: suggestion_type
          in: query
          required: false
          description: 提案種別
          schema:
            type: string
            enum:
              - home_summary
              - daily_comment
            example: home_summary
        - name: sort
          in: query
          required: false
          description: suggested_at の並び順
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: limit
          in: query
          required: false
          description: 取得件数
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          description: 取得開始位置
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: AI提案履歴取得成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - suggestions
                  - total
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: "#/components/schemas/AISuggestion"
                  total:
                    type: integer
                    example: 12
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - AISuggestions
      summary: AI提案生成
      description: |
        ログインユーザーの記録・所有アイテム・使用アイテム・成分情報をもとにAI提案を生成し、ai_suggestions に保存する。

        suggestion_type により用途を分ける。
          - home_summary: ホーム画面用の直近傾向分析
          - daily_comment: 記録保存後の短文コメント

        成分情報はバックエンド側で items.ingredient_ids から ingredients を取得し、AIに渡す。
        ユーザー向けの成分検索APIは提供しない。
      security:
        - firebaseAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AISuggestionCreateInput"
      responses:
        "201":
          description: AI提案生成・保存成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AISuggestion"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: AI提案生成失敗
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: |
        Firebase Authentication で取得した ID Token を Authorization ヘッダーに指定する。
        例: Authorization: Bearer <Firebase ID Token>

  responses:
    BadRequest:
      description: リクエスト内容が不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Firebase ID Token が未指定、無効、または期限切れ
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    User:
      type: object
      required:
        - id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Firebase Authentication の UID
          example: firebase_uid_xxxxx
        name:
          type: string
          nullable: true
          example: 加藤 美咲
        birth_day:
          type: string
          format: date
          nullable: true
          example: "1998-10-31"
        skin_type:
          type: string
          nullable: true
          enum:
            - normal
            - dry
            - oily
            - combination
            - sensitive
          example: combination
        created_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00
        updated_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00

    DailyLogSummary:
      type: object
      required:
        - id
        - log_date
        - skin_condition
      properties:
        id:
          type: string
          format: uuid
          example: 7f1a30f0-0e1f-4f4b-9c8d-8f1f5b7c1234
        log_date:
          type: string
          format: date
          example: 2026-05-17
        skin_condition:
          type: integer
          description: 1=悪い, 2=普通, 3=良い
          enum:
            - 1
            - 2
            - 3
          example: 2

    DailyLogDetail:
      type: object
      required:
        - id
        - user_id
        - log_date
        - skin_condition
        - isMenstruation
        - used_items
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 7f1a30f0-0e1f-4f4b-9c8d-8f1f5b7c1234
        user_id:
          type: string
          description: Firebase Authentication の UID
          example: firebase_uid_xxxxx
        log_date:
          type: string
          format: date
          example: 2026-05-17
        skin_condition:
          type: integer
          description: 1=悪い, 2=普通, 3=良い
          enum:
            - 1
            - 2
            - 3
          example: 2
        weather:
          type: string
          nullable: true
          enum:
            - sunny
            - cloudy
            - rainy
          example: cloudy
        sleep_level:
          type: string
          nullable: true
          enum:
            - short
            - normal
            - long
          example: normal
        meal_balance:
          type: string
          nullable: true
          enum:
            - good
            - normal
            - bad
          example: normal
        free_note:
          type: string
          nullable: true
          example: 少し乾燥ぎみだった
        isMenstruation:
          type: boolean
          example: false
        used_items:
          $ref: "#/components/schemas/DailyLogUsedItems"
        created_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00
        updated_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00

    DailyLogUpsertInput:
      type: object
      required:
        - log_date
        - skin_condition
        - isMenstruation
      properties:
        log_date:
          type: string
          format: date
          example: 2026-05-17
        skin_condition:
          type: integer
          description: 1=悪い, 2=普通, 3=良い
          enum:
            - 1
            - 2
            - 3
          example: 2
        weather:
          type: string
          nullable: true
          enum:
            - sunny
            - cloudy
            - rainy
          example: cloudy
        sleep_level:
          type: string
          nullable: true
          enum:
            - short
            - normal
            - long
          example: normal
        meal_balance:
          type: string
          nullable: true
          enum:
            - good
            - normal
            - bad
          example: normal
        free_note:
          type: string
          nullable: true
          example: 少し乾燥ぎみだった
        isMenstruation:
          type: boolean
          example: false
        used_items:
          $ref: "#/components/schemas/DailyLogUsedItemsInput"

    DailyLogUpdateInput:
      type: object
      properties:
        # パスパラメータで日付を指定するため、リクエストボディから log_date は削除
        skin_condition:
          type: integer
          description: 1=悪い, 2=普通, 3=良い
          enum: [1, 2, 3]
          example: 3
        weather:
          type: string
          nullable: true
          enum: [sunny, cloudy, rainy]
          example: sunny
        sleep_level:
          type: string
          nullable: true
          enum: [short, normal, long]
          example: normal
        meal_balance:
          type: string
          nullable: true
          enum: [good, normal, bad]
          example: good
        free_note:
          type: string
          nullable: true
          example: 保湿したら良くなった
        isMenstruation:
          type: boolean
          example: false
        used_items:
          $ref: "#/components/schemas/DailyLogUsedItemsInput"

    DailyLogUsedItemsInput:
      type: object
      description: |
        1日分の使用アイテム履歴。
        朝と夜をそれぞれ1件ずつ扱う。
      properties:
        morning:
          $ref: "#/components/schemas/LogUsedItemGroupInput"
        night:
          $ref: "#/components/schemas/LogUsedItemGroupInput"

    LogUsedItemGroupInput:
      type: object
      required:
        - item_ids
      properties:
        item_ids:
          type: array
          description: 使用した items.id の配列。配列の順序を使用順として扱う。
          items:
            type: string
            format: uuid
          example:
            - 4d3e1e8a-0f4d-4e75-bd12-1b76d7991234
            - 9b8e1a6c-1d9f-432a-bf37-35bfeaf91234

    DailyLogUsedItems:
      type: object
      description: |
        1日分の使用アイテム履歴。
        朝と夜をそれぞれ1件ずつ返す。
      properties:
        morning:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/LogUsedItemGroup"
        night:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/LogUsedItemGroup"

    LogUsedItemGroup:
      type: object
      required:
        - id
        - time_of_day
        - item_ids
        - items
      properties:
        id:
          type: string
          format: uuid
          description: log_used_items.id
          example: 64a7736a-857d-4fc0-b496-8b3c26e91234
        time_of_day:
          type: string
          enum:
            - morning
            - night
          example: morning
        item_ids:
          type: array
          description: 使用した items.id の配列。配列の順序を使用順として扱う。
          items:
            type: string
            format: uuid
          example:
            - 4d3e1e8a-0f4d-4e75-bd12-1b76d7991234
            - 9b8e1a6c-1d9f-432a-bf37-35bfeaf91234
        items:
          type: array
          description: 表示用のアイテム情報。item_ids の順序に合わせて返す。
          items:
            $ref: "#/components/schemas/Item"

    Item:
      type: object
      required:
        - id
        - brand
        - name
        - category_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: 4d3e1e8a-0f4d-4e75-bd12-1b76d7991234
        brand:
          type: string
          example: ランコム
        name:
          type: string
          example: ジェニフィック アドバンスト N
        category_id:
          type: string
          format: uuid
          description: categories.id。カテゴリ一覧取得APIはMVPでは提供しない。
          example: b0d1c4de-6c61-4c4a-9b10-3a19fda11234
        category_name:
          type: string
          nullable: true
          description: 表示用カテゴリ名。必要な場合のみ返す。
          example: 美容液
        ingredients:
          type: array
          description: |
            AI提案生成時に参照する成分名一覧。
            ユーザー向けの成分検索には使用しない。
          items:
            type: string
          example:
            - ビフィズス菌培養溶解質
            - ヒアルロン酸Na
            - ナイアシンアミド
        created_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00
        updated_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00

    UserItem:
      type: object
      required:
        - id
        - user_id
        - item_id
        - item
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: a8a6c948-283f-40f4-9c4a-4034d5c91234
        user_id:
          type: string
          description: Firebase Authentication の UID
          example: firebase_uid_xxxxx
        item_id:
          type: string
          format: uuid
          example: 4d3e1e8a-0f4d-4e75-bd12-1b76d7991234
        item:
          $ref: "#/components/schemas/Item"
        created_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00
        updated_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00

    AISuggestionCreateInput:
      type: object
      required:
        - suggestion_type
      properties:
        suggestion_type:
          type: string
          enum:
            - home_summary
            - daily_comment
          example: home_summary
        target_date:
          type: string
          format: date
          nullable: true
          description: |
            daily_comment の場合に対象日を指定する。
            home_summary の場合は省略可能。
          example: 2026-05-17
        start_date:
          type: string
          format: date
          nullable: true
          description: |
            home_summary の分析対象開始日。
            未指定の場合はバックエンド側で直近7日などのデフォルト期間を使用する。
          example: 2026-05-11
        end_date:
          type: string
          format: date
          nullable: true
          description: |
            home_summary の分析対象終了日。
            未指定の場合はバックエンド側で当日を使用する。
          example: 2026-05-17

    AISuggestion:
      type: object
      required:
        - id
        - user_id
        - suggested_at
        - suggestion_type
        - title
        - created_at
      properties:
        id:
          type: string
          format: uuid
          example: 91d5c671-6f3d-48f2-b1e5-8acdbd9a1234
        user_id:
          type: string
          description: Firebase Authentication の UID
          example: firebase_uid_xxxxx
        suggested_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00
        suggestion_type:
          type: string
          enum:
            - home_summary
            - daily_comment
          example: home_summary
        title:
          type: string
          example: 今日は引き算推奨日です
        body:
          type: string
          nullable: true
          example: 直近1週間は肌状態が安定しています。今日はアイテムを重ねすぎず、シンプルなケアをおすすめします。
        basis:
          type: string
          nullable: true
          description: RAGや記録データに基づく根拠
          example: 直近7日間の肌記録、使用アイテム、睡眠、食事、天気、成分情報を参照
        created_at:
          type: string
          format: date-time
          example: 2026-05-17T10:00:00+09:00

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
          example: 認証情報が無効です
